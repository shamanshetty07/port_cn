# ═══════════════════════════════════════════════════════════════
# PortOrange — Configuration File
# ═══════════════════════════════════════════════════════════════

# ── Polling Settings ──────────────────────────────────────────
polling:
  interval_seconds: 15          # How often to poll each device
  timeout_seconds: 10           # SNMP/API timeout per device
  retries: 2                    # Retry count on poll failure

# ── Database Settings ─────────────────────────────────────────
database:
  path: "data/portorange.db"    # SQLite database file path
  retention_days: 90            # Auto-purge events older than this

# ── Flap Detection ────────────────────────────────────────────
flap_detection:
  enabled: true
  threshold: 5                  # Number of transitions to trigger flapping
  window_seconds: 60            # Sliding time window for counting transitions
  stability_multiplier: 2       # Clear flapping after N × window with no flips

# ── Alert Settings ────────────────────────────────────────────
alerting:
  cooldown_seconds: 300         # Per-port alert cooldown to prevent storms
  channels:
    console:
      enabled: true
    email:
      enabled: false
      smtp_host: "${SMTP_HOST}"
      smtp_port: 587
      smtp_user: "${SMTP_USER}"
      smtp_password: "${SMTP_PASSWORD}"
      from_address: "portorange@example.com"
      to_addresses:
        - "admin@example.com"
    webhook:
      enabled: false
      url: "${WEBHOOK_URL}"
      type: "slack"             # slack | teams | pagerduty

# ── Device Inventory ─────────────────────────────────────────
devices:
  - id: "sw-core-01"
    name: "Core Switch 01"
    host: "192.168.1.1"
    driver: "simulated"         # snmp | simulated
    snmp_community: "public"
    snmp_version: "2c"          # 2c | 3
    port_count: 24              # Only used for simulated driver
    port_criticality:
      1: "critical"
      2: "critical"

  - id: "sw-access-01"
    name: "Access Switch 01"
    host: "192.168.1.2"
    driver: "simulated"
    snmp_community: "public"
    snmp_version: "2c"
    port_count: 48

  - id: "sw-dist-01"
    name: "Distribution Switch 01"
    host: "192.168.1.3"
    driver: "simulated"
    snmp_community: "public"
    snmp_version: "2c"
    port_count: 24

# ── Server Settings ──────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 8000
  dashboard_url: "http://localhost:8000"
